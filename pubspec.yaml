name: miui_icon_generator
description: A new Flutter project.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # AI
  google_generative_ai: ^0.4.7

  # Desktop window
  window_manager: ^0.5.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  vector_graphics: ^1.1.2

  # Color
  flex_color_picker: ^3.8.0
  palette_generator: ^0.3.3+3

  # HTTP & API
  http: ^1.1.2
  dio: ^5.9.2
  download_task: ^1.0.4

  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5

  # Image Handling
  cached_network_image: ^3.4.1
  screenshot: ^3.0.0
  image: ^4.8.0
  crop_your_image: ^2.0.0
  video_player: ^2.11.1
  video_player_media_kit: ^2.0.0
  media_kit_libs_windows_video: 1.0.11
  media_kit_libs_macos_video: 1.1.4

  # Archive/Zip
  archive: ^4.0.9

  # XML
  xml: ^6.5.0

  # Navigation
  go_router: ^17.1.0

  # File Operations
  path: ^1.8.3
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  android_path_provider: ^0.3.1
  permission_handler: ^12.0.1

  # Fonts
  dynamic_cached_fonts: ^1.2.0

  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^3.2.5

dependency_overrides:
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/u1/
    - assets/icons/u2/
    - assets/icons/u3/
    - assets/icons/u4/
    # - assets/icons/u5/
    - assets/9pngs/
    - assets/tags/
    - assets/lockscreen/weatherIcon/
    - assets/users/
